name: Build Firmware

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'software/esp32/**'
      - '.github/workflows/**'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'software/esp32/**'

jobs:
  build-esp32:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [esp32, esp32s3, esp32c3, esp32c6]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up ESP-IDF
      uses: espressif/esp-idf-ci-action@v1
      with:
        esp_idf_version: v5.3
        target: ${{ matrix.target }}
        path: 'software/esp32/subboard'
    
    - name: Build
      run: |
        cd software/esp32/subboard
        idf.py set-target ${{ matrix.target }}
        idf.py build
    
    - name: Upload Binary
      uses: actions/upload-artifact@v4
      with:
        name: subboard-${{ matrix.target }}-bin
        path: software/esp32/subboard/build/*.bin
