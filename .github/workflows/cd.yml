name: CD

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  pack-firmware:
    name: Pack Firmware (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [esp32, esp32s3, esp32c3, esp32c6]

    steps:
      - uses: actions/checkout@v6

      - name: Set up ESP-IDF
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v6.0
          target: ${{ matrix.target }}
          path: 'unit'

      - name: Pack
        run: |
          mkdir -p release
          cp unit/build/*.bin release/
          cd release
          tar czf subboard-${{ matrix.target }}.tar.gz *.bin

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v6
        with:
          name: firmware-${{ matrix.target }}
          path: release/subboard-${{ matrix.target }}.tar.gz

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: software/host/web

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install & Build Frontend
        run: |
          npm ci
          npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v6
        with:
          name: web-dist
          path: software/host/web/dist/

  pack-host:
    name: Pack Host (${{ matrix.target }})
    needs: build-frontend
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            ext: ''
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            ext: '.exe'
            archive: zip
          - target: x86_64-apple-darwin
            os: macos-13
            ext: ''
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            ext: ''
            archive: tar.gz

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: software/host

      - name: Download frontend dist
        uses: actions/download-artifact@v7
        with:
          name: web-dist
          path: software/host/web/dist/

      - name: Build (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          cd software/host
          cargo build --release --target ${{ matrix.target }}
          BINARY="target/${{ matrix.target }}/release/heterolink-host${{ matrix.ext }}"
          ASSET_NAME="heterolink-host-${{ matrix.target }}"
          mkdir -p release
          cp "$BINARY" "release/heterolink-host${{ matrix.ext }}"
          cd release && tar czf "${ASSET_NAME}.tar.gz" "heterolink-host${{ matrix.ext }}" && cd ..
          FULL_NAME="${ASSET_NAME}-full"
          mkdir -p "release/${FULL_NAME}/web"
          cp "$BINARY" "release/${FULL_NAME}/"
          cp -r web/dist "release/${FULL_NAME}/web/"
          cd release && tar czf "${FULL_NAME}.tar.gz" "${FULL_NAME}"

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cd software/host
          cargo build --release --target ${{ matrix.target }}
          $BINARY = "target/${{ matrix.target }}/release/heterolink-host.exe"
          $ASSET_NAME = "heterolink-host-${{ matrix.target }}"
          New-Item -ItemType Directory -Path "release" -Force
          Copy-Item $BINARY "release/heterolink-host.exe"
          cd release
          Compress-Archive -Path "heterolink-host.exe" -DestinationPath "$ASSET_NAME.zip" -Force
          cd ..
          $FULL_NAME = "$ASSET_NAME-full"
          New-Item -ItemType Directory -Path "release/$FULL_NAME/web" -Force
          Copy-Item $BINARY "release/$FULL_NAME/"
          Copy-Item -Recurse "web/dist/*" "release/$FULL_NAME/web/"
          cd release
          Compress-Archive -Path $FULL_NAME -DestinationPath "$FULL_NAME.zip" -Force

      - name: Upload host artifact
        uses: actions/upload-artifact@v6
        with:
          name: host-${{ matrix.target }}
          path: |
            software/host/release/heterolink-host-${{ matrix.target }}.${{ matrix.archive }}
            software/host/release/heterolink-host-${{ matrix.target }}-full.${{ matrix.archive }}

  publish:
    name: Publish Draft
    needs: [pack-firmware, pack-host]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: Collect release assets
        run: |
          mkdir -p release-assets
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' \) -exec cp {} release-assets/ \;

      - name: Create Draft Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release:
    name: Verify & Release
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Verify & Publish Release
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            const { data: release } = await github.rest.repos.getReleaseByTag({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag: tag,
            });

            const assetCount = release.assets.length;
            core.info(`Release has ${assetCount} asset(s)`);

            const expectedAssets = 4 * 2 + 4 * 2;
            if (assetCount < expectedAssets) {
              core.setFailed(`Expected ${expectedAssets} assets, found ${assetCount}`);
              return;
            }

            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.id,
              draft: false,
              make_latest: true,
            });
            core.info(`Published release ${tag}`);
