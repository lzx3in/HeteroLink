name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ============================================================
  # Stage 1: Build — 编译固件和前端
  # ============================================================

  build-firmware:
    name: Build Firmware (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [esp32, esp32s3, esp32c3, esp32c6]

    steps:
      - uses: actions/checkout@v6

      - name: Set up ESP-IDF
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v6.0
          target: ${{ matrix.target }}
          path: 'unit'

      - name: Upload Binary
        uses: actions/upload-artifact@v5
        with:
          name: subboard-${{ matrix.target }}-bin
          path: unit/build/*.bin

  build-frontend:
    name: Build Frontend (Vue)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: software/host/web

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install
        run: npm ci

      - name: Type Check
        run: npm run type-check

      - name: Build
        run: npm run build

      - name: Upload dist
        uses: actions/upload-artifact@v5
        with:
          name: web-dist
          path: software/host/web/dist/

  # ============================================================
  # Stage 2: Test — Rust 代码检查与测试
  # ============================================================

  test-host:
    name: Test Host (Rust)
    needs: build-frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: software/host

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: software/host

      - name: Download frontend dist
        uses: actions/download-artifact@v5
        with:
          name: web-dist
          path: software/host/web/dist/

      - name: Check
        run: cargo check --all-features

      - name: Test
        run: cargo test --all-features

      - name: Clippy
        run: cargo clippy --all-features -- -D warnings
